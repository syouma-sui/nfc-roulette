<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFC来店ルーレット</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111, #333);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 36px;
    }

    p {
      opacity: 0.9;
      line-height: 1.7;
    }

    input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      margin-top: 20px;
      font-size: 18px;
    }

    .start {
      margin-top: 25px;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #00c853;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    .start:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
      min-height: 50px;
    }

    .coupon {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: gold;
      color: black;
      font-weight: bold;
      display: none;
    }

    .line-btn {
      display: block;
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: #06c755;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.7;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">🎯</div>

    <h1>NFC来店ルーレット</h1>

    <p>
      NFCタップありがとうございます！<br>
      1日1回チャレンジできます
    </p>

    <input type="text" id="name" placeholder="名前を入力">

    <button class="start" onclick="spinRoulette()">
      START
    </button>

    <div class="result" id="result"></div>

    <div class="coupon" id="coupon"></div>

    <a class="line-btn"
       href="https://line.me/"
       target="_blank">
      LINE登録で特典UP
    </a>

    <div class="note">
      📱 NFCタップ後にこの画面を表示<br>
      🎁 当選内容をスタッフへ提示してください
    </div>

  </div>

  <script>

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPDieUC_0fqEHvKF8ddXCnHIUozcyi34i9mpNoRmZloalSvOzTy76ZxzRq_UiEzny_Qw/exec";

    const rewards = [
      "🎉 10%OFF",
      "☕ ドリンク無料",
      "🍰 デザート無料",
      "😢 はずれ…でもありがとう！"
    ];

    function spinRoulette() {

      const userName = document.getElementById("name").value;

      if (!userName) {
        alert("名前を入力してください");
        return;
      }

      const result = document.getElementById("result");
      const coupon = document.getElementById("coupon");

      result.textContent = "抽選中...";
      coupon.style.display = "none";

      setTimeout(() => {

        const finalReward =
          rewards[Math.floor(Math.random() * rewards.length)];

        result.textContent = finalReward;

        const code =
          Math.random()
          .toString(36)
          .substring(2,8)
          .toUpperCase();

        coupon.style.display = "block";
        coupon.textContent = "クーポンコード：" + code;

        fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            name: userName,
            reward: finalReward,
            coupon: code
          })
        });

      }, 1000);
    }

  </script>

</body>
</html>
