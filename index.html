S<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFC来店ルーレット</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg,#111,#333);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 42px;
    }

    p {
      opacity: 0.8;
      line-height: 1.7;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      margin-top: 20px;
      font-size: 16px;
    }

    #result {
      margin: 28px 0;
      min-height: 50px;
      font-size: 30px;
      font-weight: bold;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 18px;
      margin-top: 16px;
      font-size: 18px;
      cursor: pointer;
      color: white;
      background: #00c896;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .coupon {
      margin-top: 20px;
      font-size: 20px;
      color: #ffd54f;
      font-weight: bold;
    }

    .note {
      margin-top: 26px;
      opacity: 0.7;
      line-height: 1.8;
      font-size: 14px;
    }

    .spinning {
      animation: flash 0.1s infinite;
    }

    @keyframes flash {
      0% { opacity:0.3; }
      50% { opacity:1; }
      100% { opacity:0.3; }
    }
  </style>
</head>

<body>

<div class="card">

  <h1>🎯</h1>

  <h2>NFC来店ルーレット</h2>

  <p>
    NFCタップありがとうございます！<br>
    1日1回チャレンジできます
  </p>

  <input
    type="text"
    id="userName"
    placeholder="名前を入力"
  >

  <div id="result">
    START
  </div>

  <button
    id="spinButton"
    onclick="spinRoulette()"
  >
    ルーレットを回す
  </button>

  <a
    href="https://lin.ee/TMxkwaW"
    target="_blank"
  >
    <button
      style="background:#06C755;"
    >
      LINE登録で特典UP
    </button>
  </a>

  <div
    id="couponCode"
    class="coupon"
  ></div>

  <div class="note">
    📱 NFCタップ後にこの画面を表示<br>
    🎁 当選内容をスタッフへ提示してください
  </div>

</div>

<script>

const rewards = [
  "☕ 次回ドリンク100円OFF",
  "🍰 ミニスイーツ無料",
  "🎉 ポイント2倍",
  "🎁 トッピング無料",
  "😳 はずれ...でもありがとう！"
];

window.onload = function () {

  if (localStorage.getItem("playedToday") === "yes") {

    document.getElementById("spinButton").disabled = true;

    document.getElementById("spinButton").innerText =
      "本日は参加済みです";
  }
};

function spinRoulette() {

  const result =
    document.getElementById("result");

  const button =
    document.getElementById("spinButton");

  const coupon =
    document.getElementById("couponCode");

  const userName =
    document.getElementById("userName").value;

  if (!userName) {
    alert("名前を入力してください");
    return;
  }

  button.disabled = true;

  localStorage.setItem("playedToday","yes");

  coupon.style.display = "none";

  result.classList.add("spinning");

  result.textContent = "抽選中...";

  let count = 0;

  const interval = setInterval(() => {

    result.textContent =
      rewards[
        Math.floor(Math.random() * rewards.length)
      ];

    count++;

    if (count > 18) {

      clearInterval(interval);

      result.classList.remove("spinning");

      const finalReward =
        rewards[
          Math.floor(Math.random() * rewards.length)
        ];

      result.textContent = finalReward;

      coupon.style.display = "block";

      coupon.textContent =
        "クーポンコード：" +
        Math.random()
          .toString(36)
          .substring(2,8)
          .toUpperCase();

        fetch(
  "https://script.google.com/macros/s/AKfycbyPDieUC_0fqEHvKF8ddXCnHIUozcyi34i9mpNoRmZloalSvOzTy76ZxzRq_UiEzny_Qw/exec",
        {
          method: "POST",
          body: JSON.stringify({
            name: userName,
            reward: finalReward
          })
        }
      );

    }

  },100);

}

</script>

</body>
</html>
