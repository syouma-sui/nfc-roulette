<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC来店ルーレット</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #111, #333);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      color: #111;
      border-radius: 28px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .label {
      font-size: 13px;
      color: #777;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 22px;
      font-size: 30px;
      line-height: 1.2;
    }
    .roulette-box {
      background: #111;
      color: #fff;
      border-radius: 22px;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 22px;
      white-space: pre-line;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .spinning {
      animation: shake 0.08s infinite;
      opacity: 0.85;
    }
    @keyframes shake {
      0% { transform: translateX(-3px) rotate(-1deg); }
      50% { transform: translateX(3px) rotate(1deg); }
      100% { transform: translateX(-3px) rotate(-1deg); }
    }
    button {
      width: 100%;
      border: none;
      background: #111;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      line-height: 1.7;
    }
    .coupon-code {
      margin-top: 14px;
      padding: 12px;
      border: 1px dashed #999;
      border-radius: 14px;
      font-weight: 700;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">NFC TOUCH BONUS</div>
    <h1>🎰 来店ルーレット</h1>

    <div id="result" class="roulette-box">ボタンを押して抽選！</div>

    <button id="spinButton" onclick="spinRoulette()">ルーレットを回す</button>

    <div id="couponCode" class="coupon-code">クーポンコード：NFC100</div>

    <div class="note">
      📱 NFCタップ後にこの画面を表示<br />
      🎁 当選内容をスタッフへ提示してください
    </div>
  </div>

  <script>
  const rewards = [
  "☕ 次回ドリンク100円OFF",
  "🍰 ミニスイーツ無料",
  "🎉 ポイント2倍",
  "🎁 トッピング無料",
  "😳 はずれ...でもありがとう！"
    ];
window.onload = function () {
  if (localStorage.getItem("playedToday") === "yes") {
    document.getElementById("spinButton").disabled = true;
    document.getElementById("spinButton").innerText = "本日は参加済みです";
  }
};
    function spinRoulette() {
      const result = document.getElementById("result");
      const button = document.getElementById("spinButton");
      const coupon = document.getElementById("couponCode");

      button.disabled = true;
      localStorage.setItem("playedToday", "yes");
      coupon.style.display = "none";
      result.classList.add("spinning");
      result.textContent = "抽選中...";

      let count = 0;
      const interval = setInterval(() => {
        result.textContent = rewards[Math.floor(Math.random() * rewards.length)];
        count++;

        if (count > 18) {
          clearInterval(interval);
          const finalReward = rewards[Math.floor(Math.random() * rewards.length)];
          result.classList.remove("spinning");
          result.textContent = finalReward;
          button.textContent = "もう一度回す";
          button.disabled = false;

          if (!finalReward.includes("はずれ")) {
            coupon.style.display = "block";
          }
        }
      }, 100);
    }
  </script>
</body>
</html>
