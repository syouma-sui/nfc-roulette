<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC来店ルーレット</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: sans-serif;
      background: linear-gradient(135deg, #111, #333);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      opacity: 0.8;
    }

    #result {
      margin: 28px 0;
      font-size: 28px;
      font-weight: bold;
      min-height: 50px;
    }

    button {
      border: none;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 18px;
      cursor: pointer;
      background: #00c896;
      color: white;
      width: 100%;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .coupon {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #ffd54f;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      opacity: 0.7;
      line-height: 1.8;
    }

    .spinning {
      animation: flash 0.1s infinite;
    }

    @keyframes flash {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎯 NFC来店ルーレット</h1>

    <p>
      NFCタップありがとうございます！<br>
      1日1回チャレンジできます
    </p>

    <div id="result">START</div>

    <button id="spinButton" onclick="spinRoulette()">
      ルーレットを回す
    </button>

    <div id="couponCode" class="coupon"></div>

    <div class="note">
      📱 NFCタップ後にこの画面を表示<br>
      🎁 当選内容をスタッフへ提示してください
    </div>
  </div>

  <script>
    const rewards = [
      "☕ 次回ドリンク100円OFF",
      "🍰 ミニスイーツ無料",
      "🎉 ポイント2倍",
      "🎁 トッピング無料",
      "😳 はずれ...でもありがとう！"
    ];

    window.onload = function () {
      if (localStorage.getItem("playedToday") === "yes") {
        document.getElementById("spinButton").disabled = true;
        document.getElementById("spinButton").innerText = "本日は参加済みです";
      }
    };

    function spinRoulette() {

      const result = document.getElementById("result");
      const button = document.getElementById("spinButton");
      const coupon = document.getElementById("couponCode");

      button.disabled = true;

      localStorage.setItem("playedToday", "yes");

      coupon.style.display = "none";

      result.classList.add("spinning");
      result.textContent = "抽選中...";

      let count = 0;

      const interval = setInterval(() => {

        result.textContent =
          rewards[Math.floor(Math.random() * rewards.length)];

        count++;

        if (count > 18) {

          clearInterval(interval);

          result.classList.remove("spinning");

          const finalReward =
            rewards[Math.floor(Math.random() * rewards.length)];

          result.textContent = finalReward;

          coupon.style.display = "block";

          coupon.textContent =
            "クーポンコード：" +
            Math.random().toString(36).substring(2,8).toUpperCase();

        }

      }, 100);

    }
  </script>

</body>
</html>
