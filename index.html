<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NFC来店ルーレット</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111, #333);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 32px;
    }

    p {
      opacity: 0.9;
      line-height: 1.7;
    }

    input, select {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      margin-top: 14px;
      font-size: 17px;
    }

    button {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 14px;
      margin-top: 18px;
      color: white;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .start {
      background: #00c853;
    }

    .admin {
      background: #555;
      font-size: 16px;
    }

    .disabled {
      background: #888;
      cursor: not-allowed;
    }

    .result {
      margin-top: 28px;
      font-size: 28px;
      font-weight: bold;
      min-height: 50px;
      line-height: 1.5;
    }

    .coupon {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: gold;
      color: black;
      font-weight: bold;
      display: none;
    }

    .line-btn {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: #06c755;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .qr {
      margin-top: 20px;
      background: white;
      padding: 12px;
      border-radius: 14px;
      display: none;
    }

    .qr img {
      width: 180px;
      height: 180px;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.75;
      line-height: 1.7;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">🎯</div>

    <h1>NFC来店ルーレット</h1>

    <p>
      NFCタップありがとうございます！<br>
      1日1回チャレンジできます
    </p>

    <select id="store">
      <option value="honmachi">本町店</option>
      <option value="namba">難波店</option>
      <option value="umeda">梅田店</option>
    </select>

    <input type="text" id="name" placeholder="名前を入力">
    <input type="text" id="loginId" placeholder="ログインID・電話番号下4桁など">

    <button class="start" id="startBtn" onclick="spinRoulette()">
      START
    </button>

    <div class="result" id="result"></div>

    <div class="coupon" id="coupon"></div>

    <a class="line-btn" id="lineBtn" href="https://line.me/" target="_blank">
      LINE登録で特典UP
    </a>

    <div class="qr" id="qrBox">
      <img id="qrImg" src="">
    </div>

    <button class="admin" onclick="showAdminInfo()">
      店舗管理用QRを表示
    </button>

    <div class="note" id="note">
      📱 NFCタップ後にこの画面を表示<br>
      🎁 当選内容をスタッフへ提示してください
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7-0-A98ofIJG5nF33w-IAB2PO3q94CeKBtzbfPGSNy0eMlnVBokIyWxsx4XMWj1SnSQ/exec";

    const LINE_URL = "https://line.me/";

    const prizes = [
      { reward: "🎉 10%OFF", weight: 20 },
      { reward: "☕ ドリンク無料", weight: 15 },
      { reward: "🍰 デザート無料", weight: 10 },
      { reward: "😢 はずれ…でもありがとう！", weight: 55 }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const storeFromUrl = urlParams.get("store");

    if (storeFromUrl) {
      document.getElementById("store").value = storeFromUrl;
    }

    const savedName = localStorage.getItem("nfc_name");
    const savedLoginId = localStorage.getItem("nfc_loginId");

    if (savedName) document.getElementById("name").value = savedName;
    if (savedLoginId) document.getElementById("loginId").value = savedLoginId;

    function getToday() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }

    function pickReward() {
      const total = prizes.reduce((sum, p) => sum + p.weight, 0);
      let rand = Math.random() * total;

      for (const prize of prizes) {
        if (rand < prize.weight) {
          return prize.reward;
        }
        rand -= prize.weight;
      }

      return prizes[prizes.length - 1].reward;
    }

    function makeCoupon() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function spinRoulette() {
      const name = document.getElementById("name").value.trim();
      const loginId = document.getElementById("loginId").value.trim();
      const store = document.getElementById("store").value;

      const result = document.getElementById("result");
      const coupon = document.getElementById("coupon");
      const lineBtn = document.getElementById("lineBtn");
      const startBtn = document.getElementById("startBtn");

      if (!name) {
        alert("名前を入力してください");
        return;
      }

      if (!loginId) {
        alert("ログインIDを入力してください");
        return;
      }

      const today = getToday();
      const playKey = "played_" + store + "_" + loginId + "_" + today;

      if (localStorage.getItem(playKey)) {
        result.textContent = "本日は参加済みです";
        startBtn.classList.add("disabled");
        return;
      }

      localStorage.setItem("nfc_name", name);
      localStorage.setItem("nfc_loginId", loginId);

      result.textContent = "抽選中...";
      coupon.style.display = "none";
      lineBtn.style.display = "none";

      setTimeout(() => {
        const reward = pickReward();
        const couponCode = makeCoupon();

        result.textContent = reward;

        coupon.style.display = "block";
        coupon.textContent = "クーポンコード：" + couponCode;

        lineBtn.href = LINE_URL;
        lineBtn.style.display = "block";

        localStorage.setItem(playKey, "true");

        fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain"
          },
          body: JSON.stringify({
            store: store,
            name: name,
            loginId: loginId,
            reward: reward,
            coupon: couponCode
          })
        });

      }, 1000);
    }

    function showAdminInfo() {
      const store = document.getElementById("store").value;
      const pageUrl = location.origin + location.pathname + "?store=" + store;
      const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(pageUrl);

      const qrBox = document.getElementById("qrBox");
      const qrImg = document.getElementById("qrImg");
      const note = document.getElementById("note");

      qrImg.src = qrUrl;
      qrBox.style.display = "block";

      note.innerHTML =
        "店舗用URL：<br>" +
        pageUrl +
        "<br><br>このQRを印刷すれば店舗別に管理できます。";
    }
  </script>

</body>
</html>
